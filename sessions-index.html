<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>Session Index Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
      :root {
        --bg: #f3efe7;
        --bg-accent: #e8dcc8;
        --panel: rgba(255, 252, 246, 0.88);
        --panel-strong: #fffaf1;
        --text: #1f1a17;
        --muted: #6d6259;
        --line: rgba(86, 66, 49, 0.14);
        --shadow: 0 24px 80px rgba(73, 54, 33, 0.12);
        --codex: #0d6b59;
        --claude: #b3532f;
        --devin: #2d6cdf;
        --highlight: #f1c46a;
        --chip: #f0e6d5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua",
          Georgia, serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(255, 243, 214, 0.9), transparent 34%),
          radial-gradient(circle at top right, rgba(198, 123, 69, 0.14), transparent 26%),
          linear-gradient(180deg, var(--bg) 0%, #f7f3eb 42%, #efe7db 100%);
      }

      .shell {
        width: min(1240px, calc(100vw - 32px));
        margin: 24px auto 48px;
      }

      .hero {
        position: relative;
        overflow: hidden;
        padding: 28px 28px 24px;
        border: 1px solid var(--line);
        border-radius: 28px;
        background:
          linear-gradient(135deg, rgba(255, 248, 236, 0.96), rgba(244, 233, 217, 0.86)),
          var(--panel);
        box-shadow: var(--shadow);
      }

      .hero::after {
        content: "";
        position: absolute;
        inset: auto -80px -120px auto;
        width: 260px;
        height: 260px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(211, 148, 84, 0.22), transparent 66%);
        pointer-events: none;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 7px 12px;
        border-radius: 999px;
        background: rgba(255, 247, 232, 0.88);
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .hero h1 {
        margin: 18px 0 10px;
        font-size: clamp(36px, 5vw, 62px);
        line-height: 0.96;
        letter-spacing: -0.04em;
      }

      .toolbar {
        display: grid;
        grid-template-columns: minmax(0, 1.5fr) repeat(3, minmax(0, 0.7fr));
        gap: 14px;
        margin-top: 24px;
      }

      .field {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 14px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255, 251, 245, 0.82);
        transition: border-color 0.15s, box-shadow 0.15s;
      }

      .field:focus-within {
        border-color: var(--claude);
        box-shadow: 0 0 0 3px rgba(179, 83, 47, 0.18);
      }

      .field input,
      .field select,
      .field button {
        width: 100%;
        border: 0;
        background: transparent;
        color: var(--text);
        font: inherit;
        padding: 14px 0;
        outline: none;
      }

      .field-icon {
        flex-shrink: 0;
        color: var(--muted);
      }

      .toggle-button:focus-visible,
      .meta-icon:focus-visible {
        outline: 2px solid var(--claude);
        outline-offset: 2px;
      }

      .field button {
        cursor: pointer;
        text-align: left;
      }

      .field.load-field {
        background: linear-gradient(135deg, #c76334, #e39b53);
        border-color: rgba(134, 63, 23, 0.22);
        box-shadow: 0 14px 34px rgba(199, 99, 52, 0.22);
      }

      .field.load-field button {
        color: #fff9f3;
        font-weight: 700;
        letter-spacing: 0.01em;
      }

      .hidden-input {
        display: none;
      }

      .board {
        margin-top: 24px;
        display: grid;
        grid-template-columns: 1fr;
        gap: 18px;
      }

      .card {
        position: relative;
        display: grid;
        grid-template-columns: minmax(0, 320px) minmax(0, 1fr);
        gap: 22px;
        padding: 24px;
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--panel-strong);
        box-shadow: 0 14px 40px rgba(62, 47, 33, 0.08);
      }

      .card::before {
        content: "";
        position: absolute;
        inset: 0 auto 0 0;
        width: 5px;
        border-radius: 24px 0 0 24px;
        background: var(--accent, var(--codex));
      }

      .card-side {
        display: grid;
        align-content: start;
        gap: 18px;
        min-width: 0;
      }

      .card-main {
        min-width: 0;
      }

      .card-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
      }

      .source-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 11px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.04);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .source-pill::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: currentColor;
      }

      .host-pill {
        display: inline-flex;
        align-items: center;
        padding: 6px 11px;
        border-radius: 999px;
        background: var(--chip);
        color: #5b4a3a;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .pill-group {
        display: inline-flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .card-title {
        margin: 0 0 14px;
        font-size: 20px;
        line-height: 1.3;
        letter-spacing: -0.01em;
      }

      .timestamp {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.4;
        text-align: right;
      }

      .meta {
        display: grid;
        gap: 14px;
      }

      .meta-row {
        display: grid;
        gap: 6px;
        position: relative;
      }

      .meta-row[data-tooltip]:hover::after {
        content: attr(data-tooltip);
        position: absolute;
        left: 0;
        bottom: 100%;
        margin-bottom: 6px;
        z-index: 20;
        padding: 6px 10px;
        max-width: 480px;
        border-radius: 8px;
        background: rgba(31, 26, 23, 0.94);
        color: #f9f1e4;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        font-size: 11px;
        letter-spacing: 0;
        text-transform: none;
        line-height: 1.45;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        pointer-events: none;
        box-shadow: 0 6px 20px rgba(31, 26, 23, 0.22);
      }

      .meta-label {
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .meta-value {
        font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
        font-size: 12px;
        line-height: 1.5;
        color: #3a3029;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        min-width: 0;
      }

      .command-frame {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 6px 6px 6px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(46, 36, 27, 0.05);
        min-width: 0;
      }

      .command-frame .meta-value {
        flex: 1;
        min-width: 0;
      }

      .meta-icon {
        flex-shrink: 0;
        border: 0;
        background: transparent;
        cursor: pointer;
        color: var(--muted);
        font-size: 14px;
        line-height: 1;
        padding: 4px 6px;
        border-radius: 6px;
      }

      .meta-icon:hover {
        background: rgba(0, 0, 0, 0.06);
        color: var(--text);
      }

      .resume-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .resume-actions .toggle-button {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .resume-actions .toggle-button svg {
        flex-shrink: 0;
      }

      .sections {
        display: grid;
        gap: 14px;
      }

      .section {
        padding: 14px;
        border-radius: 18px;
        background: rgba(242, 234, 219, 0.55);
      }

      .section-title {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 8px;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .section-title svg {
        flex-shrink: 0;
      }

      .section-body {
        margin: 0;
        font-size: 15px;
        line-height: 1.62;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .section-body.markdown {
        white-space: normal;
      }

      .section-body.markdown > :first-child {
        margin-top: 0;
      }

      .section-body.markdown > :last-child {
        margin-bottom: 0;
      }

      .section-body.markdown p,
      .section-body.markdown ul,
      .section-body.markdown ol,
      .section-body.markdown pre,
      .section-body.markdown blockquote,
      .section-body.markdown table {
        margin: 0 0 0.85em;
      }

      .section-body.markdown h1,
      .section-body.markdown h2,
      .section-body.markdown h3,
      .section-body.markdown h4,
      .section-body.markdown h5,
      .section-body.markdown h6 {
        margin: 1em 0 0.5em;
        line-height: 1.2;
        letter-spacing: -0.02em;
        font-weight: 700;
      }

      .section-body.markdown h1 {
        font-size: 1.7em;
      }

      .section-body.markdown h2 {
        font-size: 1.45em;
      }

      .section-body.markdown h3 {
        font-size: 1.25em;
      }

      .section-body.markdown h4 {
        font-size: 1.12em;
      }

      .section-body.markdown h5 {
        font-size: 1.05em;
      }

      .section-body.markdown h6 {
        font-size: 1em;
        font-style: italic;
      }

      .section-body.markdown code {
        display: inline-block;
        max-width: 100%;
        padding: 0.12em 0.38em;
        border-radius: 6px;
        background: rgba(80, 58, 38, 0.08);
        font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
        font-size: 0.92em;
        white-space: pre-wrap;
        word-break: break-word;
        overflow-wrap: anywhere;
        vertical-align: top;
      }

      .section-body.markdown pre {
        overflow-x: hidden;
        max-width: 100%;
        padding: 12px 14px;
        border-radius: 14px;
        background: rgba(51, 37, 24, 0.92);
        color: #f9f1e4;
        white-space: pre-wrap;
        word-break: break-word;
        overflow-wrap: anywhere;
      }

      .section-body.markdown pre code {
        display: block;
        padding: 0;
        background: transparent;
        color: inherit;
        white-space: inherit;
        word-break: inherit;
        overflow-wrap: inherit;
      }

      .section-body.markdown blockquote {
        padding-left: 14px;
        border-left: 3px solid rgba(179, 83, 47, 0.4);
        color: #5d5249;
      }

      .section-body.markdown ul,
      .section-body.markdown ol {
        padding-left: 1.4em;
      }

      .section-body.markdown a {
        color: #8c3f22;
      }

      .section-body.markdown table {
        display: block;
        width: 100%;
        max-width: 100%;
        overflow-x: auto;
        border-collapse: collapse;
        border-spacing: 0;
        font-size: 0.96em;
      }

      .section-body.markdown thead {
        background: rgba(80, 58, 38, 0.06);
      }

      .section-body.markdown th,
      .section-body.markdown td {
        padding: 10px 12px;
        border: 1px solid rgba(86, 66, 49, 0.22);
        text-align: left;
        vertical-align: top;
      }

      .assistant-body {
        position: relative;
        max-height: 260px;
        overflow: hidden;
      }

      .assistant-body.is-collapsed::after {
        content: "";
        position: absolute;
        inset: auto 0 0 0;
        height: 72px;
        background: linear-gradient(180deg, rgba(255, 250, 241, 0), rgba(255, 250, 241, 1));
        pointer-events: none;
      }

      .assistant-body.is-expanded {
        max-height: none;
        overflow: visible;
      }

      .section-actions {
        display: flex;
        justify-content: flex-start;
        margin-top: 10px;
      }

      .section-actions[hidden] {
        display: none;
      }

      .toggle-button {
        border: 0;
        border-radius: 999px;
        padding: 9px 14px;
        background: #ead8bd;
        color: #5b3f2e;
        font: inherit;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
      }

      .toggle-button:hover {
        background: #e4cca8;
      }

      mark {
        background: linear-gradient(180deg, transparent 20%, rgba(241, 196, 106, 0.7) 20%);
        color: inherit;
        padding: 0 1px;
      }

      .empty {
        padding: 44px 24px;
        border: 1px dashed var(--line);
        border-radius: 24px;
        text-align: center;
        color: var(--muted);
        background: rgba(255, 250, 242, 0.56);
      }

      @media (max-width: 980px) {
        .toolbar {
          grid-template-columns: 1fr 1fr;
        }
      }

      @media (max-width: 720px) {
        .shell {
          width: min(100vw - 20px, 1240px);
          margin-top: 10px;
        }

        .hero {
          padding: 22px 18px 18px;
          border-radius: 22px;
        }

        .toolbar {
          grid-template-columns: 1fr;
        }

        .board {
          grid-template-columns: 1fr;
        }

        .card {
          grid-template-columns: 1fr;
          gap: 18px;
          padding: 20px;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div class="eyebrow">Session Index Viewer</div>
        <h1>Pick up<br />Where you left off.</h1>

        <div class="toolbar">
          <label class="field">
            <svg class="field-icon" viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="7" cy="7" r="4.5"/>
              <path d="M10.5 10.5L13.5 13.5"/>
            </svg>
            <input
              id="searchInput"
              type="search"
              placeholder="Search keywords"
            />
          </label>

          <label class="field">
            <select id="sourceFilter">
              <option value="all">All Sources</option>
              <option value="codex">Codex</option>
              <option value="claude">Claude</option>
              <option value="devin">Devin</option>
            </select>
          </label>

          <label class="field">
            <select id="hostFilter">
              <option value="all">All Hosts</option>
            </select>
          </label>

          <label class="field load-field">
            <button id="refreshButton" type="button">Refresh</button>
          </label>
        </div>
      </section>

      <section id="board" class="board" aria-live="polite"></section>
    </main>

    <script>
      const state = {
        sessions: [],
        filtered: [],
      };

      const board = document.getElementById("board");
      const searchInput = document.getElementById("searchInput");
      const sourceFilter = document.getElementById("sourceFilter");
      const hostFilter = document.getElementById("hostFilter");
      const refreshButton = document.getElementById("refreshButton");
      const expandedAssistants = new Set();
      const COLLAPSED_ASSISTANT_MAX_HEIGHT = 260;

      function escapeHtml(text) {
        return String(text ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function formatTimestamp(value) {
        if (!value) return "Unknown time";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return value;
        // en-GB gives 24h DMY ("12 Jun 2026, 19:19") regardless of the
        // viewer's system locale.
        return new Intl.DateTimeFormat("en-GB", {
          year: "numeric",
          month: "short",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
        }).format(date);
      }

      const RELATIVE_FORMATTER = new Intl.RelativeTimeFormat("en", { numeric: "auto" });

      function formatRelative(value) {
        if (!value) return "Unknown";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return value;
        const seconds = (date.getTime() - Date.now()) / 1000;
        const abs = Math.abs(seconds);
        if (abs < 60) return RELATIVE_FORMATTER.format(Math.round(seconds), "second");
        if (abs < 3600) return RELATIVE_FORMATTER.format(Math.round(seconds / 60), "minute");
        if (abs < 86400) return RELATIVE_FORMATTER.format(Math.round(seconds / 3600), "hour");
        if (abs < 86400 * 7) return RELATIVE_FORMATTER.format(Math.round(seconds / 86400), "day");
        if (abs < 86400 * 30) return RELATIVE_FORMATTER.format(Math.round(seconds / 86400 / 7), "week");
        if (abs < 86400 * 365) return RELATIVE_FORMATTER.format(Math.round(seconds / 86400 / 30), "month");
        return RELATIVE_FORMATTER.format(Math.round(seconds / 86400 / 365), "year");
      }

      function highlight(text, query) {
        const safe = escapeHtml(text || " ");
        if (!query) return safe;
        const escapedQuery = query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        const regex = new RegExp(`(${escapedQuery})`, "ig");
        return safe.replace(regex, "<mark>$1</mark>");
      }

      function renderMarkdown(text) {
        const raw = text || " ";
        if (window.marked?.parse) {
          return window.marked.parse(raw, {
            breaks: true,
            gfm: true,
          });
        }
        return escapeHtml(raw);
      }

      function assistantKey(item) {
        return `${item.source}|${item.session_id}`;
      }

      function syncAssistantOverflows() {
        document.querySelectorAll(".assistant-body").forEach((body) => {
          const key = body.getAttribute("data-assistant-key");
          if (!key) return;
          const actions = document.querySelector(
            `.section-actions[data-session-key="${CSS.escape(key)}"]`
          );
          const button = actions?.querySelector(".toggle-button");
          if (!actions || !button) return;

          const needsToggle = body.scrollHeight > COLLAPSED_ASSISTANT_MAX_HEIGHT + 8;
          if (!needsToggle) {
            actions.hidden = true;
            expandedAssistants.delete(key);
            body.classList.remove("is-expanded");
            body.classList.remove("is-collapsed");
            body.style.maxHeight = "none";
            body.style.overflow = "visible";
            return;
          }

          body.style.maxHeight = "";
          body.style.overflow = "";
          actions.hidden = false;
          button.textContent = expandedAssistants.has(key) ? "Collapse" : "Expand";
        });
      }

      function normalizeSession(raw) {
        return {
          source: raw.source || "unknown",
          host: raw.host || "unknown",
          timestamp: raw.timestamp || "",
          cwd: raw.cwd || "",
          session_id: raw.session_id || "",
          title: raw.title || "",
          first_user: raw.first_user || "",
          last_user: raw.last_user || "",
          last_assistant: raw.last_assistant || "",
          resume_command: raw.resume_command || "",
        };
      }

      function sourceAccent(source) {
        if (source === "claude") return "var(--claude)";
        if (source === "devin") return "var(--devin)";
        return "var(--codex)";
      }

      function render() {
        const query = searchInput.value.trim().toLowerCase();
        const source = sourceFilter.value;
        const host = hostFilter.value;

        const filtered = state.sessions
          .filter((item) => {
            if (source !== "all" && item.source !== source) return false;
            if (host !== "all" && item.host !== host) return false;
            if (!query) return true;
            const haystack = [
              item.cwd,
              item.session_id,
              item.title,
              item.first_user,
              item.last_user,
              item.last_assistant,
            ]
              .join("\n")
              .toLowerCase();
            return haystack.includes(query);
          })
          .sort((a, b) => {
            const left = new Date(a.timestamp).getTime() || 0;
            const right = new Date(b.timestamp).getTime() || 0;
            return right - left;
          });

        state.filtered = filtered;
        if (!filtered.length) {
          board.innerHTML =
            '<div class="empty">No matching sessions. Try a different query.</div>';
          return;
        }

        board.innerHTML = filtered
          .map((item, idx) => {
            const queryText = searchInput.value.trim();
            return `
              <article class="card" style="--accent:${sourceAccent(item.source)}">
                <div class="card-side">
                  <header class="card-head">
                    <span class="pill-group">
                      <span class="source-pill" style="color:${sourceAccent(item.source)}">
                        ${escapeHtml(item.source)}
                      </span>
                      <span class="host-pill">${escapeHtml(item.host)}</span>
                    </span>
                  </header>

                  <div class="meta">
                    <div class="meta-row" data-tooltip="${escapeHtml(formatTimestamp(item.timestamp))}">
                      <div class="meta-label">timestamp</div>
                      <div class="meta-value">${escapeHtml(formatRelative(item.timestamp))}</div>
                    </div>
                    <div class="meta-row" data-tooltip="${escapeHtml(item.cwd)}">
                      <div class="meta-label">cwd</div>
                      <div class="meta-value">${escapeHtml(item.cwd)}</div>
                    </div>
                    <div class="meta-row" data-tooltip="${escapeHtml(item.session_id)}">
                      <div class="meta-label">session id</div>
                      <div class="meta-value">${escapeHtml(item.session_id)}</div>
                    </div>
                    <div class="meta-row" data-tooltip="${escapeHtml(item.resume_command)}">
                      <div class="meta-label">command</div>
                      <div class="command-frame">
                        <div class="meta-value">${escapeHtml(item.resume_command)}</div>
                        <button
                          class="meta-icon"
                          type="button"
                          data-action="copy"
                          data-idx="${idx}"
                          title="Copy command"
                          aria-label="Copy command"
                        >⧉</button>
                      </div>
                    </div>
                  </div>

                  <div class="resume-actions">
                    <button class="toggle-button" type="button" data-action="open" data-idx="${idx}">
                      <svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4.5 5l3 3-3 3"/><line x1="8.5" y1="11.5" x2="12" y2="11.5"/></svg>
                      Open in Terminal
                    </button>
                  </div>
                </div>

                <div class="card-main">
                  ${
                    item.title
                      ? `<h3 class="card-title">${highlight(item.title, queryText)}</h3>`
                      : ""
                  }
                  <div class="sections">
                    <section class="section">
                      <div class="section-title">
                        <svg viewBox="0 0 12 12" width="10" height="10" fill="currentColor" aria-hidden="true"><path d="M3 2L10 6L3 10Z"/></svg>
                        Opening prompt
                      </div>
                      <p class="section-body">${highlight(item.first_user || " ", queryText)}</p>
                    </section>
                    <section class="section">
                      <div class="section-title">
                        <svg viewBox="0 0 12 12" width="10" height="10" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2.5 4.5l3.5 3.5 3.5-3.5"/></svg>
                        Last prompt
                      </div>
                      <p class="section-body">${highlight(item.last_user || " ", queryText)}</p>
                    </section>
                    <section class="section">
                      <div class="section-title">
                        <svg viewBox="0 0 12 12" width="10" height="10" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9.5 3.5v2a2 2 0 0 1-2 2H3"/><path d="M5 5.5L3 7.5l2 2"/></svg>
                        Last reply
                      </div>
                      <div
                        class="section-body markdown assistant-body ${
                          expandedAssistants.has(assistantKey(item))
                            ? "is-expanded"
                            : "is-collapsed"
                        }"
                        data-assistant-key="${escapeHtml(assistantKey(item))}"
                      >${renderMarkdown(item.last_assistant || " ")}</div>
                      <div
                        class="section-actions"
                        data-session-key="${escapeHtml(assistantKey(item))}"
                      >
                        <button
                          class="toggle-button"
                          type="button"
                          data-action="toggle"
                          data-session-key="${escapeHtml(assistantKey(item))}"
                        >
                          ${
                            expandedAssistants.has(assistantKey(item))
                              ? "Collapse"
                              : "Expand"
                          }
                        </button>
                      </div>
                    </section>
                  </div>
                </div>
              </article>
            `;
          })
          .join("");

        requestAnimationFrame(syncAssistantOverflows);
      }

      function syncHostOptions() {
        const hosts = [...new Set(state.sessions.map((item) => item.host))].sort();
        const current = hostFilter.value;
        hostFilter.innerHTML =
          '<option value="all">All Hosts</option>' +
          hosts
            .map(
              (host) =>
                `<option value="${escapeHtml(host)}">${escapeHtml(host)}</option>`
            )
            .join("");
        if ([...hostFilter.options].some((opt) => opt.value === current)) {
          hostFilter.value = current;
        }
      }

      function applyData(payload) {
        if (!Array.isArray(payload)) {
          throw new Error("JSON root must be an array");
        }
        state.sessions = payload.map(normalizeSession);
        syncHostOptions();
        render();
      }

      async function loadSessions() {
        try {
          const response = await fetch("/api/sessions?limit=100", {
            cache: "no-store",
          });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          applyData(await response.json());
        } catch (error) {
          board.innerHTML =
            '<div class="empty">Failed to load /api/sessions. Is server.py running?</div>';
        }
      }

      function flashButton(button, text) {
        // Save innerHTML so SVG-only icon buttons can be restored.
        const original = button.innerHTML;
        button.textContent = text;
        setTimeout(() => {
          button.innerHTML = original;
        }, 1200);
      }

      async function copyResume(item, button) {
        const ok = button.classList.contains("meta-icon") ? "✓" : "Copied!";
        const fail = button.classList.contains("meta-icon") ? "✗" : "Copy failed";
        try {
          await navigator.clipboard.writeText(item.resume_command);
          flashButton(button, ok);
        } catch (error) {
          flashButton(button, fail);
        }
      }

      async function openResume(item, button) {
        try {
          const response = await fetch("/api/resume", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              source: item.source,
              session_id: item.session_id,
              cwd: item.cwd,
            }),
          });
          const result = await response.json();
          if (!result.ok) {
            throw new Error(result.error || "resume failed");
          }
          flashButton(button, button.classList.contains("card-icon") ? "✓" : "Opened!");
        } catch (error) {
          flashButton(button, button.classList.contains("card-icon") ? "✗" : "Failed");
          console.error(error);
        }
      }

      searchInput.addEventListener("input", render);
      sourceFilter.addEventListener("change", render);
      hostFilter.addEventListener("change", render);

      // Refetch when the tab comes back into focus — matches the
      // common flow of running a session in CLI then switching here.
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") loadSessions();
      });
      board.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-action]");
        if (!button) return;
        const action = button.dataset.action;

        if (action === "toggle") {
          const key = button.getAttribute("data-session-key");
          if (!key) return;
          if (expandedAssistants.has(key)) {
            expandedAssistants.delete(key);
          } else {
            expandedAssistants.add(key);
          }
          render();
          return;
        }

        const item = state.filtered[Number(button.dataset.idx)];
        if (!item) return;
        if (action === "copy") copyResume(item, button);
        if (action === "open") openResume(item, button);
      });

      refreshButton.addEventListener("click", loadSessions);

      loadSessions();
    </script>
  </body>
</html>
